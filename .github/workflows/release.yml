name: Release

# Builds the StagShip Print Agent on Windows (NSIS installer with
# @thiagoelg/node-printer compiled natively for Electron) and on Apple-hosted
# Mac runners (DMGs, signed + notarized). On a tag push, electron-builder
# packages and uploads everything — including the `latest.yml` manifests that
# electron-updater needs — to the matching GitHub Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required so electron-builder can create / update the Release

jobs:
  build-windows:
    runs-on: windows-2022
    name: Build (Windows)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win --publish always

  build-mac:
    runs-on: macos-14
    name: Build (macOS)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run build
          npx electron-builder --mac --publish always
